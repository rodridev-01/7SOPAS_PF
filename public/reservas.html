<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas | 7 Sopas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <link rel="icon" href="../img/logo.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/styles.css">

  <script src="../js/components/Navbar.js" defer></script>
  <script src="../js/components/Footer.js" defer></script>
  <script src="../js/components/Loader.js" defer></script>
</head>

<body>
  <main-navbar></main-navbar>

  <main>
    <section class="section reservation-section d-flex align-items-center" style="min-height: 90vh;">
      <div class="container">

        <div class="row justify-content-center">
          <div class="col-lg-8">

            <div class="text-center mb-4">
              <h2 class="section-title mb-2">Reserva tu mesa</h2>
              <p class="text-muted mb-0">
                Selecciona una sede, horario y cantidad de personas. Tu reserva quedará registrada en el sistema.
              </p>
            </div>

            <div id="mensajeReserva"></div>

            <div class="card shadow-lg border-0 cart-panel">
              <div class="card-body p-4">

                <form id="formReserva" class="row g-3">

                  <div class="col-md-6">
                    <label for="nombreReserva" class="form-label">Nombre completo</label>
                    <input type="text" id="nombreReserva" class="form-control" minlength="3" maxlength="60" required>
                  </div>

                  <div class="col-md-6">
                    <label for="telefonoReserva" class="form-label">Teléfono</label>
                    <input type="tel" id="telefonoReserva" class="form-control" placeholder="Ej. 987654321"
                      pattern="9[0-9]{8}" required>
                    <small class="text-muted">Debe tener 9 dígitos y empezar con 9.</small>
                  </div>

                  <div class="col-md-6">
                    <label for="emailReserva" class="form-label">Correo opcional</label>
                    <input type="email" id="emailReserva" class="form-control" placeholder="correo@ejemplo.com">
                  </div>

                  <div class="col-md-6">
                    <label for="sedeReserva" class="form-label">Sede</label>
                    <select id="sedeReserva" class="form-select" required>
                      <option value="">Cargando sedes...</option>
                    </select>
                  </div>

                  <div class="col-md-4">
                    <label for="fechaReserva" class="form-label">Fecha</label>
                    <input type="date" id="fechaReserva" class="form-control" required>
                  </div>

                  <div class="col-md-4">
                    <label for="horaReserva" class="form-label">Hora</label>
                    <input type="time" id="horaReserva" class="form-control" required>
                  </div>

                  <div class="col-md-4">
                    <label for="personasReserva" class="form-label">Personas</label>
                    <input type="number" id="personasReserva" class="form-control" min="1" max="12" value="2"
                      required>
                  </div>

                  <div class="col-12">
                    <label for="comentariosReserva" class="form-label">Comentarios opcionales</label>
                    <textarea id="comentariosReserva" class="form-control" rows="3"
                      placeholder="Ej. mesa familiar, silla para niño, cumpleaños, etc."></textarea>
                  </div>

                  <div class="col-12 d-grid d-md-flex justify-content-md-end gap-2 mt-4">
                    <a href="sedes" class="btn btn-outline-secondary">Ver sedes</a>
                    <button type="submit" id="btnReserva" class="btn btn-danger px-4">
                      <i class="bi bi-calendar-check"></i> Confirmar reserva
                    </button>
                  </div>

                </form>

              </div>
            </div>

          </div>
        </div>

      </div>
    </section>
  </main>

  <main-footer></main-footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/reservas.js"></script>
</body>

</html>
