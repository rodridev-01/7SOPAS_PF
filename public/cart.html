<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito | 7 Sopas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../img/logo.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/styles.css">
  <script src="../js/components/Navbar.js" defer></script>
  <script src="../js/components/Footer.js" defer></script>
  <script src="../js/components/Loader.js" defer></script>
</head>

<body>
  <main-navbar></main-navbar>

  <main>
    <section class="section cart-section">
      <div class="container">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-4">
          <div>
            <h2 class="section-title mb-2">MI CARRITO</h2>
            <p class="text-muted mb-0">Revisa tus sopas, actualiza cantidades y registra tu pedido.</p>
          </div>
          <a href="menu" class="btn btn-outline-danger">
            <i class="bi bi-arrow-left"></i> Seguir comprando
          </a>
        </div>

        <div id="mensajeCarrito"></div>

        <div class="row g-4">
          <div class="col-lg-8">
            <div class="card cart-panel">
              <div class="card-body">
                <div id="listaCarrito"></div>
              </div>
            </div>
          </div>

          <div class="col-lg-4">
            <div class="card cart-panel sticky-lg-top cart-summary">
              <div class="card-body">
                <h5 class="fw-bold mb-3">Resumen del pedido</h5>

                <div class="d-flex justify-content-between mb-2">
                  <span>Subtotal</span>
                  <strong id="subtotalCarrito">S/ 0.00</strong>
                </div>
                <div class="d-flex justify-content-between mb-3">
                  <span>Delivery</span>
                  <strong id="deliveryCarrito">S/ 0.00</strong>
                </div>
                <hr>
                <div class="d-flex justify-content-between fs-5 mb-4">
                  <span>Total</span>
                  <strong id="totalCarrito">S/ 0.00</strong>
                </div>

                <form id="formPedido">
                  <div class="mb-3">
                    <label for="nombreCliente" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nombreCliente" placeholder="Tu nombre" minlength="3" maxlength="60" required>
                  </div>

                  <div class="mb-3">
                    <label for="telefonoCliente" class="form-label">Teléfono</label>
                    <input type="tel" class="form-control" id="telefonoCliente" placeholder="Ej. 987654321" pattern="9[0-9]{8}" required>
                    <small class="text-muted">Debe tener 9 dígitos y empezar con 9.</small>
                  </div>

                  <div class="mb-3">
                    <label for="emailCliente" class="form-label">Correo opcional</label>
                    <input type="email" class="form-control" id="emailCliente" placeholder="correo@ejemplo.com">
                  </div>

                  <div class="mb-3">
                    <label for="sedePedido" class="form-label">Sede</label>
                    <select id="sedePedido" class="form-select" required>
                      <option value="">Cargando sedes...</option>
                    </select>
                  </div>

                  <div class="mb-3">
                    <label for="tipoEntrega" class="form-label">Tipo de entrega</label>
                    <select id="tipoEntrega" class="form-select">
                      <option value="recojo">Recojo en tienda</option>
                      <option value="delivery">Delivery</option>
                    </select>
                  </div>

                  <div class="mb-3 d-none" id="grupoDireccion">
                    <label for="direccionCliente" class="form-label">Dirección</label>
                    <textarea id="direccionCliente" class="form-control" rows="2" placeholder="Ingresa tu dirección para delivery"></textarea>
                  </div>

                  <button type="submit" class="btn btn-danger w-100" id="btnConfirmarPedido">
                    <i class="bi bi-check-circle"></i> Confirmar pedido
                  </button>
                  <button type="button" class="btn btn-outline-secondary w-100 mt-2" id="btnVaciarCarrito">
                    Vaciar carrito
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <main-footer></main-footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/cart.js"></script>
</body>

</html>
