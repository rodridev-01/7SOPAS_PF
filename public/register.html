<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | 7 Sopas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../img/logo.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/styles.css">
  <script src="../js/components/Navbar.js" defer></script>
  <script src="../js/components/Footer.js" defer></script>
</head>

<body>
  <main-navbar></main-navbar>

  <main class="d-flex justify-content-center align-items-center">
    <div class="login-card p-4">
      <h3 class="text-center mb-4">Crear cuenta</h3>
      <div id="mensajeRegistro"></div>
      <input class="form-control mb-3" type="text" id="nombre" placeholder="Nombre completo" minlength="3" maxlength="60" required>
      <input class="form-control mb-3" type="email" id="email" placeholder="Correo" required>
      <input class="form-control mb-2" type="password" id="password" placeholder="Contraseña" minlength="6" required>
      <small class="text-muted d-block mb-3">Mínimo 6 caracteres.</small>
      <button class="btn btn-dark w-100" id="btnRegistro">Registrarse</button>

      <p class="text-center mt-3 mb-0">
        ¿Ya tienes cuenta? <a href="login">Inicia sesión</a>
      </p>
    </div>
  </main>

  <main-footer></main-footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/register.js"></script>
</body>

</html>
