<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Administrador | 7 Sopas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-danger bg-gradient min-vh-100 d-flex align-items-center">
  <main class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-lg rounded-4">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <i class="bi bi-shield-lock-fill text-danger fs-1"></i>
              <h1 class="h3 fw-bold mt-2 mb-1">Panel administrador</h1>
              <p class="text-muted mb-0">Ingrese con una cuenta de administrador.</p>
            </div>

            <div id="mensajeAdminLogin"></div>

            <form id="formAdminLogin" novalidate>
              <div class="mb-3">
                <label for="inputEmail" class="form-label">Usuario / correo</label>
                <input class="form-control" id="inputEmail" type="email" value="admin@7sopas.com" autocomplete="username" required>
              </div>
              <div class="mb-3">
                <label for="inputPassword" class="form-label">Contraseña</label>
                <input class="form-control" id="inputPassword" type="password" value="admin123" autocomplete="current-password" required>
              </div>
              <button class="btn btn-danger w-100 fw-semibold" type="submit">Ingresar al panel</button>
            </form>

            <div class="alert alert-light border mt-4 mb-0 small">
              <strong>Credenciales académicas:</strong><br>
              Usuario: <code>admin@7sopas.com</code><br>
              Contraseña: <code>admin123</code>
            </div>

            <div class="text-center mt-3">
              <a href="/" class="text-decoration-none small">Volver a la página principal</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/admin/assets/js/admin-auth.js"></script>
  <script src="/admin/assets/js/admin-login.js"></script>
</body>
</html>
