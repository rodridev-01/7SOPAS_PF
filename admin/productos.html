<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos | 7 Sopas Admin</title>

  <!-- CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="/admin/assets/css/styles.css" rel="stylesheet">
  <script src="/admin/assets/js/components/Sidebar.js"></script>
  
  <style>
    :root { --7sopas-red: #d90429; --bg-body: #f4f7f6; }
    body { background-color: var(--bg-body); font-family: 'Segoe UI', Roboto, sans-serif; }
    
    .main-content { margin-left: 260px; padding: 30px; transition: 0.3s; }
    .card-admin { border: none; border-radius: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.04); background: white; }
    
    /* Ajustes de Tabla */
    .table thead th { background: #f8f9fa; color: #6c757d; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; border: none; }
    .product-img { width: 45px; height: 45px; object-fit: cover; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .price-tag { font-size: 0.85rem; color: #2b2d42; background: #edf2f4; padding: 2px 8px; border-radius: 6px; }
    
    .btn-7sopas { background-color: var(--7sopas-red); color: white; border-radius: 10px; font-weight: 500; }
    .btn-7sopas:hover { background-color: #b90424; color: white; }

    @media(max-width:991px) { .main-content { margin-left: 0; padding: 15px; } }
  </style>
</head>
<body>

  <admin-sidebar></admin-sidebar>

  <main class="main-content">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="fw-bold mb-0">Gestión de Productos</h2>
        <p class="text-muted small">Tienes <span id="totalCuentas" class="fw-bold">0</span> productos registrados</p>
      </div>
      <button class="btn btn-7sopas px-4 py-2" onclick="nuevoProducto()">
        <i class="bi bi-plus-circle me-2"></i> Agregar Sopa
      </button>
    </div>

    <!-- Contenedor Tabla -->
    <div class="card-admin p-4">
      <div class="table-responsive">
        <table id="tablaProductos" class="table table-hover align-middle w-100">
          <thead>
            <tr>
              <th>Producto</th>
              <th>Categoría</th>
              <th>Precios (S/ P-M-G)</th>
              <th>Estado</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody id="cuerpoTabla">
            <!-- Cargado por JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal CRUD -->
  <div class="modal fade" id="modalProd" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 rounded-4 shadow">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold" id="modalTitulo">Nuevo Producto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="formProd">
          <div class="modal-body">
            <input type="hidden" id="prod_id">
            <div class="mb-3">
              <label class="form-label small fw-bold">Nombre del plato</label>
              <input type="text" class="form-control" id="prod_nombre" required>
            </div>
            <div class="row mb-3">
              <div class="col-6">
                <label class="form-label small fw-bold">Categoría</label>
                <select class="form-select" id="prod_cat">
                  <option value="sopas">Sopas</option>
                  <option value="bebidas">Bebidas</option>
                  <option value="entradas">Entradas</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label small fw-bold">Disponibilidad</label>
                <select class="form-select" id="prod_disp">
                  <option value="true">Disponible</option>
                  <option value="false">Agotado</option>
                </select>
              </div>
            </div>
            <label class="form-label small fw-bold">Precios (Soles)</label>
            <div class="row g-2">
              <div class="col-4">
                <input type="number" class="form-control" id="p_1" placeholder="Pers." required>
              </div>
              <div class="col-4">
                <input type="number" class="form-control" id="p_2" placeholder="Med." required>
              </div>
              <div class="col-4">
                <input type="number" class="form-control" id="p_3" placeholder="Gran." required>
              </div>
            </div>
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cerrar</button>
            <button type="submit" class="btn btn-7sopas">Guardar Cambios</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/admin/assets/js/productos.js"></script>
</body>
</html>
