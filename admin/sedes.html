<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sedes | 7 Sopas Admin</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="/admin/assets/css/styles.css" rel="stylesheet">

    <style>
        :root {
            --7sopas-red: #d90429;
            --bg-body: #f4f7f6;
        }

        body {
            background-color: var(--bg-body);
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        .main-content {
            margin-left: 260px;
            padding: 30px;
            transition: 0.3s;
        }

        .card-admin {
            border: none;
            border-radius: 16px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.04);
            background: white;
        }

        .table thead th {
            background: #f8f9fa;
            color: #6c757d;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            border: none;
        }

        .btn-7sopas {
            background-color: var(--7sopas-red);
            color: white;
            border-radius: 10px;
            font-weight: 500;
        }

        .btn-7sopas:hover {
            background-color: #b90424;
            color: white;
        }

        @media(max-width:991px) {
            .main-content {
                margin-left: 0;
                padding: 15px;
            }
        }
    </style>
</head>

<body>

    <script src="/admin/assets/js/components/Sidebar.js"></script>
    <admin-sidebar></admin-sidebar>

    <main class="main-content">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0">Gestión de Sedes</h2>
                <p class="text-muted small">Administra los locales de 7 Sopas</p>
            </div>
            <button class="btn btn-7sopas px-4 py-2" onclick="nuevaSede()">
                <i class="bi bi-geo-alt-fill me-2"></i> Agregar Sede
            </button>
        </div>

        <!-- Tabla -->
        <div class="card-admin p-4">
            <div class="table-responsive">
                <table id="tablaSedes" class="table table-hover align-middle w-100">
                    <thead>
                        <tr>
                            <th>Nombre de Sede</th>
                            <th>Distrito</th>
                            <th>Dirección</th>
                            <th>Mesas</th>
                            <th>Estado</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla">
                        <!-- JS Data -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal CRUD -->
    <div class="modal fade" id="modalSede" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="modalTitulo">Nueva Sede</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="formSede">
                    <div class="modal-body">
                        <input type="hidden" id="sede_id">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Nombre</label>
                            <input type="text" class="form-control" id="sede_nombre" placeholder="Ej: 7 Sopas Surquillo"
                                required>
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label small fw-bold">Distrito</label>
                                <input type="text" class="form-control" id="sede_distrito" placeholder="Ej: Surquillo"
                                    required>
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-bold">N° Mesas</label>
                                <input type="number" class="form-control" id="sede_mesas" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Dirección</label>
                            <input type="text" class="form-control" id="sede_direccion" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Estado del Local</label>
                            <select class="form-select" id="sede_estado">
                                <option value="true">Operativo</option>
                                <option value="false">Mantenimiento / Cerrado</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-7sopas">Guardar Sede</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/assets/js/sedes.js"></script>
</body>

</html>
