<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos | 7 Sopas Admin</title>

  <!-- CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="/admin/assets/css/styles.css" rel="stylesheet">
  <script src="/admin/assets/js/components/Sidebar.js"></script>
  
  <style>
    :root { --7sopas-red: #d90429; --bg-body: #f4f7f6; }
    body { background-color: var(--bg-body); font-family: 'Segoe UI', Roboto, sans-serif; }
    .main-content { margin-left: 260px; padding: 30px; transition: 0.3s; }
    .card-admin { border: none; border-radius: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.04); background: white; }
    
    /* Estados */
    .badge-pendiente { background-color: #fff3cd; color: #856404; }
    .badge-preparando { background-color: #cfe2ff; color: #084298; }
    .badge-entregado { background-color: #d1e7dd; color: #0f5132; }
    .badge-cancelado { background-color: #f8d7da; color: #842029; }

    @media(max-width:991px) { .main-content { margin-left: 0; padding: 15px; } }
  </style>
</head>
<body>

  <script src="/admin/assets/js/components/Sidebar.js"></script>
  <admin-sidebar></admin-sidebar>

  <main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="fw-bold mb-0">Gestión de Pedidos</h2>
        <p class="text-muted small">Monitorea las ventas y estados de entrega</p>
      </div>
    </div>

    <div class="card-admin p-4">
      <div class="table-responsive">
        <table id="tablaPedidos" class="table table-hover align-middle w-100">
          <thead>
            <tr>
              <th>ID</th>
              <th>Fecha</th>
              <th>Cliente / Sede</th>
              <th>Productos</th>
              <th>Total</th>
              <th>Estado</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody id="cuerpoTabla">
            <!-- JS Data -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal para Cambiar Estado -->
  <div class="modal fade" id="modalEstado" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content border-0 rounded-4 shadow">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold">Actualizar Estado</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="pedido_id_status">
          <select class="form-select" id="nuevo_estado_select">
            <option value="pendiente">Pendiente</option>
            <option value="preparando">Preparando</option>
            <option value="entregado">Entregado</option>
            <option value="cancelado">Cancelado</option>
          </select>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-primary w-100" onclick="confirmarCambioEstado()">Actualizar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/admin/assets/js/pedidos.js"></script>
</body>
</html>
